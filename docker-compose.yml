version: '3.9'
services:
  postgres:
    build:
      context: ./db
      dockerfile: Dockerfile
    image: smarthub-postgres:16
    container_name: smarthub-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: smarthub
      POSTGRES_USER: smarthub
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smarthub -d smarthub"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smarthub-internal

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: smarthub-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: mathieu.pleitinx@smartclick.be
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    expose:
      - "80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - smarthub-internal

  api:
    build: ./api
    container_name: smarthub-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://smarthub:${DB_PASSWORD}@smarthub-db:5432/smarthub
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: "false"
      NAS_BASE_PATH: /mnt/nas/smarthub/Clients
    volumes:
      - ./api:/app
      - /mnt/nas/smarthub:/mnt/nas/smarthub
    ports:
      - "8080:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - smarthub-internal

  caddy:
    image: caddy:2-alpine
    container_name: smarthub-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - caddy_logs:/var/log/caddy
    depends_on:
      - api
    networks:
      - smarthub-internal
      - kimai-net

volumes:
  postgres_data:
  pgadmin_data:
  caddy_data:
  caddy_config:
  caddy_logs:

networks:
  smarthub-internal:
    driver: bridge
  kimai-net:
    external: true
    name: stack_stack_internal
